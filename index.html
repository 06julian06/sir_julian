<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Twitch RPG Medieval</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;background:transparent;font-family:'Press Start 2P',monospace;color:#b89b4a}
#game-container{position:absolute;bottom:0;left:0;width:100%;height:220px;transition:height 0.8s;overflow:hidden}
#game-container.fullscreen{height:1080px}
canvas{image-rendering:pixelated}
#bg-canvas,#fx-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#bg-canvas{z-index:0}#fx-canvas{z-index:2;pointer-events:none}
#mode-toggle{display:none}
.character{position:absolute;bottom:45px;z-index:20;transition:left 2s ease-in-out}
.character.melee{z-index:22}.character.ranged{z-index:18}
.character canvas{width:64px;height:64px;display:block}
.character.tier-1 canvas{filter:drop-shadow(0 0 2px #888)}
.character.tier-2 canvas{filter:drop-shadow(0 0 3px #55aaff)}
.character.tier-3 canvas{filter:drop-shadow(0 0 4px #aa55ff)}
.character.tier-4 canvas{filter:drop-shadow(0 0 5px #ff8833)}
.character.tier-5 canvas{filter:drop-shadow(0 0 6px #ff4444) drop-shadow(0 0 12px #ff220044)}
.char-name{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:bold;color:#ffdd66;white-space:nowrap;text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000,0 0 4px rgba(255,200,50,0.5);letter-spacing:0.5px}
.char-bars{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:54px}
.bar{width:100%;height:6px;background:#111;border:1px solid #333;margin-bottom:1px;position:relative;overflow:hidden}
.bar-fill{height:100%;transition:width 0.3s}
.bar-text{position:absolute;top:0;left:0;width:100%;height:100%;font-size:4px;line-height:6px;text-align:center;color:#fff;text-shadow:0 0 2px #000,1px 1px 0 #000;z-index:1;pointer-events:none}
.hp-fill{background:linear-gradient(90deg,#3a8a3a,#1a4a1a)}
.mp-fill{background:linear-gradient(90deg,#3a3aaa,#1a1a55)}
.char-title{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:7px;text-shadow:0 0 4px rgba(200,168,50,.5)}
.char-lvl{position:absolute;top:-20px;right:-8px;font-size:5px;color:#5588aa;text-shadow:1px 1px 0 #000}
.char-shield{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:10px;opacity:0;transition:opacity 0.3s}
.char-shield.on{opacity:1}
#boss-zone{position:fixed;right:60px;bottom:20px;z-index:25;text-align:center;display:none}
#boss-zone.active{display:block}
#boss-zone canvas{width:200px;height:200px;display:block;margin:0 auto}
#boss-name{font-size:10px;color:#aa2222;text-shadow:0 0 6px rgba(120,0,0,.4),2px 2px 0 #000;letter-spacing:3px;text-transform:uppercase}
#boss-phase{font-size:7px;color:#cc5500;text-shadow:1px 1px 0 #000;margin:2px 0}
#boss-hp-bar{width:200px;height:12px;background:#0a0808;border:1px solid #3a1010;margin:4px auto;position:relative;box-shadow:inset 0 1px 4px rgba(0,0,0,.6)}
#boss-hp-fill{height:100%;background:linear-gradient(90deg,#cc2020,#6a0808);transition:width 0.4s}
#boss-hp-text{position:absolute;top:0;left:0;width:100%;height:100%;font-size:6px;line-height:14px;text-align:center;color:#fff;text-shadow:1px 1px 0 #000;font-family:'Press Start 2P',monospace;z-index:1;pointer-events:none}
@keyframes forgeFlicker{0%,100%{filter:brightness(1) drop-shadow(0 0 4px rgba(255,100,0,.3))}25%{filter:brightness(1.05) drop-shadow(0 0 6px rgba(255,120,0,.4))}50%{filter:brightness(1.1) drop-shadow(0 0 8px rgba(255,80,0,.5))}75%{filter:brightness(1.02) drop-shadow(0 0 5px rgba(255,100,0,.35))}}
#shop-zone{position:absolute;left:20px;bottom:55px;z-index:15;display:none}
#shop-zone.open{display:block}
#shop-zone canvas{width:128px;height:72px;display:block;animation:forgeFlicker 2s ease-in-out infinite}
#shop-label{font-size:7px;color:#d4af37;text-align:center;text-shadow:0 0 6px rgba(200,120,0,.4),1px 1px 0 #000;letter-spacing:2px}
#hud{position:fixed;top:8px;left:8px;z-index:100;background:linear-gradient(180deg,rgba(12,12,28,.95),rgba(8,8,18,.98));border:1px solid #2a2418;padding:8px 12px;font-size:7px;line-height:2;max-width:380px;box-shadow:0 2px 12px rgba(0,0,0,.6)}
.hud-title{color:#9a8340;font-size:9px;letter-spacing:3px;margin-bottom:4px;text-transform:uppercase;border-bottom:1px solid #1a1810;padding-bottom:4px}
#season-hud{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:100;background:linear-gradient(180deg,rgba(12,12,28,.95),rgba(8,8,18,.98));border:1px solid #2a2418;padding:6px 16px;font-size:8px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.6);letter-spacing:1px}
#combat-log{display:none}
.log-dmg{color:#cc4444}.log-heal{color:#44aa44}.log-special{color:#cc7722}.log-info{color:#5577aa}.log-gold{color:#aa8833}.log-mvp{color:#cc55aa}.log-event{color:#9944aa}
#event-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;display:none;background:linear-gradient(180deg,rgba(15,10,30,.97),rgba(8,6,18,.99));border:1px solid #3a2060;padding:20px 30px;text-align:center;max-width:500px;min-width:350px;box-shadow:0 0 40px rgba(100,30,180,.2)}
#event-modal.show{display:block}
#event-modal .ev-title{font-size:13px;color:#aa55cc;margin-bottom:8px;letter-spacing:2px;text-transform:uppercase}
#event-modal .ev-desc{font-size:7px;color:#999;margin-bottom:12px;line-height:2}
#event-modal .ev-timer{font-size:10px;color:#cc3333;margin-bottom:8px}
#event-modal .ev-votes{font-size:8px;color:#9a8340;margin-bottom:6px}
.ev-btn{background:rgba(20,15,35,.9);color:#9a8340;border:1px solid #3a3020;padding:6px 16px;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;margin:4px;text-transform:uppercase;letter-spacing:1px}
.ev-btn:hover{background:#2a2418;color:#d4af37;border-color:#6a5a30}
#scoreboard{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:250;display:none;background:linear-gradient(180deg,rgba(12,12,28,.97),rgba(6,6,14,.99));border:1px solid #2a2418;padding:16px 28px;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.7)}
#scoreboard.show{display:block}
.sb-title{font-size:13px;color:#9a8340;margin-bottom:8px;letter-spacing:3px;text-transform:uppercase}
.sb-line{font-size:8px;margin:4px 0}
@keyframes forgeOpen{0%{opacity:0;transform:translate(-50%,-50%) scale(.85)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes emberPulse{0%,100%{box-shadow:0 0 30px rgba(180,80,0,.15),0 0 60px rgba(0,0,0,.7),inset 0 0 40px rgba(0,0,0,.3)}50%{box-shadow:0 0 40px rgba(200,100,0,.25),0 0 80px rgba(0,0,0,.7),inset 0 0 40px rgba(0,0,0,.3)}}
@keyframes goldShine{0%,100%{text-shadow:0 0 6px rgba(212,175,55,.4),2px 2px 0 #000}50%{text-shadow:0 0 12px rgba(255,200,50,.6),0 0 20px rgba(212,175,55,.3),2px 2px 0 #000}}
#shop-overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);z-index:260;display:none;opacity:0;background:linear-gradient(180deg,#1a120a,#0e0906 40%,#120a06);border:2px solid #5a3a1a;border-image:linear-gradient(180deg,#8a6a30,#3a2510,#8a6a30) 1;padding:18px 22px;max-width:720px;width:92%;animation:emberPulse 4s ease-in-out infinite}
#shop-overlay.show{display:block;opacity:1;transform:translate(-50%,-50%) scale(1);animation:forgeOpen .35s ease-out forwards,emberPulse 4s ease-in-out 0.35s infinite}
.shop-header{text-align:center;color:#d4af37;font-size:12px;letter-spacing:4px;text-transform:uppercase;padding-bottom:8px;margin-bottom:10px;text-shadow:0 0 8px rgba(200,140,20,.5),0 0 20px rgba(180,100,0,.2),2px 2px 0 #000;border-bottom:2px solid transparent;border-image:linear-gradient(90deg,transparent,#5a3a1a,#8a6a30,#5a3a1a,transparent) 1}
.shop-gold{text-align:center;color:#ffcc44;font-size:9px;margin-bottom:10px;animation:goldShine 3s ease-in-out infinite;letter-spacing:1px}
.shop-tabs{display:flex;gap:6px;margin-bottom:10px;justify-content:center}
.shop-tab{background:linear-gradient(180deg,#1e150d,#120c08);color:#6a5a40;border:1px solid #3a2a18;padding:5px 14px;font-family:'Press Start 2P',monospace;font-size:6px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .25s;position:relative}
.shop-tab.active{color:#ffcc44;border-color:#8a6a30;background:linear-gradient(180deg,#2a1c0e,#1a1008);box-shadow:0 2px 0 #d4af37,0 4px 12px rgba(180,100,0,.2)}
.shop-tab:hover{color:#cc9933;border-color:#5a3a1a;background:linear-gradient(180deg,#251a0e,#180e08);text-shadow:0 0 4px rgba(200,120,0,.3)}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;max-height:340px;overflow-y:auto;padding-right:4px}
.shop-grid::-webkit-scrollbar{width:6px}
.shop-grid::-webkit-scrollbar-track{background:#0e0906;border-radius:3px}
.shop-grid::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#5a3a1a,#3a2510);border-radius:3px}
.shop-grid::-webkit-scrollbar-thumb:hover{background:#8a6a30}
.shop-item{background:linear-gradient(180deg,#1a130c,#100a06);border:1px solid #2a1e14;padding:8px 10px;cursor:pointer;transition:all .25s;position:relative}
.shop-item:hover{border-color:#8a6a30;background:linear-gradient(180deg,#221a0f,#16100a);box-shadow:0 0 12px rgba(180,100,0,.15);transform:translateY(-1px)}
.shop-item.owned{opacity:.35;cursor:default;border-color:#3a3020}
.shop-item.owned:hover{transform:none;box-shadow:none}
.shop-item.locked{opacity:.4;cursor:not-allowed;filter:grayscale(.4)}
.shop-item.locked:hover{transform:none;box-shadow:none;border-color:#2a1e14}
.shop-item-name{font-size:7px;color:#d4c4a0;margin-bottom:3px;letter-spacing:.5px}
.shop-item-stats{font-size:5px;color:#55aadd;margin-bottom:3px;letter-spacing:.5px}
.shop-item-cost{font-size:6px;color:#ffcc44;text-shadow:0 0 4px rgba(200,150,0,.3)}
.shop-item-tier{display:inline-block;font-size:5px;padding:1px 5px;border-radius:2px;margin-left:4px;font-weight:bold;text-shadow:0 0 4px currentColor}
.shop-close{position:absolute;top:8px;right:12px;color:#884433;font-size:10px;cursor:pointer;background:none;border:none;font-family:'Press Start 2P',monospace;transition:all .2s;text-shadow:0 0 4px rgba(0,0,0,.5)}
.shop-close:hover{color:#ff4433;text-shadow:0 0 8px rgba(255,50,30,.5)}
#wave-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;text-align:center;opacity:0;transition:opacity 0.5s}
#wave-banner.show{opacity:1}
.wave-title{font-size:24px;color:#9a8340;text-shadow:0 0 15px rgba(150,130,60,.5),2px 2px 0 #000;letter-spacing:4px;text-transform:uppercase}
.wave-sub{font-size:12px;color:#883333;text-shadow:0 0 8px rgba(120,30,30,.4),2px 2px 0 #000;letter-spacing:2px}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes atkR{0%{transform:translateX(0)}50%{transform:translateX(25px)}100%{transform:translateX(0)}}
@keyframes hit{0%{filter:brightness(1)}50%{filter:brightness(3)}100%{filter:brightness(1)}}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-35px)}}
@keyframes bossShake{0%{transform:translateX(0)}25%{transform:translateX(-10px)}50%{transform:translateX(10px)}75%{transform:translateX(-5px)}100%{transform:translateX(0)}}
@keyframes bossDeath{0%{opacity:1;transform:scale(1)}30%{opacity:.7;transform:scale(1.2);filter:brightness(3) hue-rotate(30deg)}60%{opacity:.4;transform:scale(1.4);filter:brightness(5) hue-rotate(60deg)}100%{opacity:0;transform:scale(.1);filter:brightness(0)}}
@keyframes screenShake{0%{transform:translate(0,0)}10%{transform:translate(-8px,5px)}20%{transform:translate(6px,-8px)}30%{transform:translate(-5px,4px)}40%{transform:translate(7px,-3px)}50%{transform:translate(-4px,6px)}60%{transform:translate(3px,-5px)}70%{transform:translate(-6px,2px)}80%{transform:translate(4px,-2px)}90%{transform:translate(-2px,3px)}100%{transform:translate(0,0)}}
@keyframes screenShakeBig{0%{transform:translate(0,0)}10%{transform:translate(-15px,10px)}20%{transform:translate(12px,-14px)}30%{transform:translate(-10px,8px)}40%{transform:translate(14px,-6px)}50%{transform:translate(-8px,12px)}60%{transform:translate(6px,-10px)}70%{transform:translate(-12px,4px)}80%{transform:translate(8px,-4px)}90%{transform:translate(-4px,6px)}100%{transform:translate(0,0)}}
@keyframes lootRain{0%{opacity:1;transform:translateY(0) scale(1.5)}50%{opacity:1;transform:translateY(40px) scale(1)}100%{opacity:0;transform:translateY(80px) scale(.5)}}
.screen-shake{animation:screenShake .4s ease-in-out}
.screen-shake-big{animation:screenShakeBig .8s ease-in-out}
.boss-dmg-popup{position:absolute;pointer-events:none;z-index:60;font-family:'Press Start 2P',monospace;font-weight:bold;animation:floatUp 1.2s forwards}
.loot-particle{position:fixed;pointer-events:none;z-index:200;font-size:16px;animation:lootRain 1.5s forwards}
@keyframes pulse{0%,100%{opacity:.7;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}
.anim-idle{animation:idle 1.5s ease-in-out infinite}
.anim-atk{animation:atkR .4s ease-in-out}
.anim-hit{animation:hit .3s}
.boss-hit{animation:bossShake .4s}
.boss-dead{animation:bossDeath 1s forwards}
.popup{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-weight:bold;pointer-events:none;animation:floatUp 1s forwards;z-index:50}
.popup-dmg{font-size:11px;color:#ff4444;text-shadow:2px 2px 0 #000}
.popup-heal{font-size:11px;color:#44ff44;text-shadow:2px 2px 0 #000}
.popup-crit{font-size:15px;color:#d4af37;text-shadow:0 0 8px rgba(212,175,55,.7),2px 2px 0 #000}
.popup-gold{font-size:9px;color:#d4af37;text-shadow:1px 1px 0 #000}
.popup-lvl{font-size:13px;color:#44ff44;text-shadow:0 0 8px rgba(0,255,0,.5),2px 2px 0 #000}
.particle{position:absolute;pointer-events:none;z-index:60;border-radius:50%;animation:particleFly .8s forwards}
.shield-anim{animation:pulse 2s ease-in-out infinite}
.xp-fill{background:linear-gradient(90deg,#d4af37,#aa8822)}
.bar.xp-bar{height:3px;margin-top:0}
.char-combo{position:absolute;top:10px;right:-12px;font-size:8px;color:#ffaa00;text-shadow:0 0 6px rgba(255,170,0,.8),1px 1px 0 #000;opacity:0;transition:opacity 0.3s}
.char-combo.show{opacity:1}
@keyframes lvlGlow{0%{filter:brightness(1) drop-shadow(0 0 0 transparent);transform:scale(1)}25%{filter:brightness(2.5) drop-shadow(0 0 12px #44ff44);transform:scale(1.15)}50%{filter:brightness(1.8) drop-shadow(0 0 20px #aaff44);transform:scale(1.1)}75%{filter:brightness(2) drop-shadow(0 0 8px #44ff44);transform:scale(1.05)}100%{filter:brightness(1) drop-shadow(0 0 0 transparent);transform:scale(1)}}
.lvl-up-glow{animation:lvlGlow 1.2s ease-in-out}
@keyframes bossWarn{0%{opacity:0}20%{opacity:.35}40%{opacity:.1}60%{opacity:.3}80%{opacity:.05}100%{opacity:0}}
.boss-warning-flash{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 70% 80%,rgba(255,0,0,.5),transparent 70%);z-index:55;pointer-events:none;animation:bossWarn .8s ease-out forwards}
.char-cd{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:5px;color:#ff4444;text-shadow:1px 1px 0 #000;white-space:nowrap;opacity:0;transition:opacity 0.3s}
.char-cd.show{opacity:1}
.char-stunned{animation:none!important;filter:grayscale(.7) brightness(.6)!important}
@keyframes critFlash{0%{opacity:0}15%{opacity:.4}30%{opacity:.1}50%{opacity:.3}100%{opacity:0}}
.crit-flash{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(255,215,0,.6),transparent 60%);z-index:55;pointer-events:none;animation:critFlash .5s ease-out forwards}
@keyframes bigHit{0%{filter:brightness(1) sepia(0)}15%{filter:brightness(3) sepia(1) hue-rotate(-30deg) saturate(3)}40%{filter:brightness(1.8) sepia(.5) hue-rotate(-20deg)}60%{filter:brightness(1.2) sepia(.2)}100%{filter:brightness(1) sepia(0)}}
.anim-big-hit{animation:bigHit .6s ease-out}
@keyframes charSpawnIn{0%{opacity:0;transform:translateY(40px) scale(.3);filter:brightness(3)}50%{opacity:1;transform:translateY(-8px) scale(1.1);filter:brightness(1.5)}75%{transform:translateY(3px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1);filter:brightness(1)}}
.char-spawn{animation:charSpawnIn .7s ease-out}
@keyframes deathFade{0%{opacity:1;filter:brightness(1)}30%{filter:brightness(3) saturate(0)}60%{opacity:.5;filter:brightness(.5) saturate(0)}100%{opacity:.15;filter:grayscale(1) brightness(.3)}}
.char-dead{animation:deathFade .8s forwards}
@keyframes enrageGlow{0%,100%{filter:brightness(1) drop-shadow(0 0 4px rgba(255,0,0,.3))}50%{filter:brightness(1.4) drop-shadow(0 0 12px rgba(255,0,0,.8))}}
.boss-enraged{animation:enrageGlow 1s ease-in-out infinite}
.kill-streak{position:fixed;top:15%;left:50%;transform:translateX(-50%);z-index:150;font-size:18px;color:#ff4444;text-shadow:0 0 15px rgba(255,0,0,.7),3px 3px 0 #000;pointer-events:none;animation:floatUp 2s forwards;font-family:'Press Start 2P',monospace}
#boss-enrage-bar{width:200px;height:4px;background:#333;margin:2px auto;overflow:hidden;display:none}
#boss-enrage-fill{height:100%;background:linear-gradient(90deg,#ff4400,#ff0000);transition:width 0.5s;width:0%}
.char-buffs{position:absolute;top:-36px;left:50%;transform:translateX(-50%);display:flex;gap:1px;font-size:6px;white-space:nowrap}
.buff-icon{opacity:.9;animation:pulse 2s ease-in-out infinite}
#ally-panel{position:fixed;bottom:230px;left:8px;z-index:90;font-size:6px;line-height:1.6}
#boss-mod-tag{font-size:6px;color:#ff8844;text-shadow:1px 1px 0 #000;letter-spacing:1px;margin:2px 0;text-align:center}
.ev-timer-bar{width:90%;height:6px;background:#222;margin:6px auto;border:1px solid #555;overflow:hidden}
.ev-timer-fill{height:100%;background:linear-gradient(90deg,#ff4444,#ff8800);transition:width 1s linear}
.char-revive-cd{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:5px;color:#ff8844;text-shadow:1px 1px 0 #000;white-space:nowrap}
@keyframes seasonFlash{0%{opacity:0}20%{opacity:.5}50%{opacity:.3}80%{opacity:.15}100%{opacity:0}}
.season-transition{position:fixed;top:0;left:0;width:100%;height:100%;z-index:55;pointer-events:none;animation:seasonFlash 1.5s ease-out forwards}
#wave-info{display:none}
.ally-entry{background:rgba(10,10,24,.8);border:1px solid #555;padding:2px 6px;margin:2px 0;color:#88cc88}
.ally-entry .ally-hp{color:#44aa44}
@keyframes bossIntro{0%{opacity:0;transform:scale(3) rotate(10deg);filter:brightness(5)}30%{opacity:.6;transform:scale(1.5) rotate(-5deg);filter:brightness(2)}60%{opacity:.9;transform:scale(1.1) rotate(2deg);filter:brightness(1.3)}100%{opacity:1;transform:scale(1) rotate(0deg);filter:brightness(1)}}
.boss-intro{animation:bossIntro 1.2s ease-out}
@keyframes idleSit{0%,100%{transform:translateY(0) scaleY(1)}30%{transform:translateY(4px) scaleY(.85)}70%{transform:translateY(4px) scaleY(.85)}}
@keyframes idleWave{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
@keyframes idleZ{0%{opacity:0;transform:translate(0,0) scale(.5)}50%{opacity:1;transform:translate(10px,-15px) scale(1)}100%{opacity:0;transform:translate(20px,-30px) scale(.6)}}
.idle-sit canvas{animation:idleSit 2s ease-in-out}
.idle-wave canvas{animation:idleWave 1.5s ease-in-out}
.idle-emote{position:absolute;top:-35px;left:50%;transform:translateX(-50%);font-size:12px;pointer-events:none;animation:floatUp 2s forwards;z-index:50}
@keyframes buffPop{0%{transform:scale(0)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.buff-new{animation:buffPop .3s ease-out}
.season-particle{position:fixed;pointer-events:none;z-index:5;animation:particleFly 4s linear forwards}
@keyframes bossIntroSlide{0%{opacity:0;transform:translate(-50%,-50%) scale(1.8);filter:brightness(3) blur(4px)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1);filter:brightness(1.5) blur(0)}80%{opacity:1;transform:translate(-50%,-50%) scale(1);filter:brightness(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.95);filter:brightness(.5)}}
#boss-intro-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:250;pointer-events:none;display:none}
#boss-intro-overlay.show{display:block}
.boss-intro-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(139,0,0,.6),rgba(10,10,24,.95) 70%)}
.boss-intro-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;animation:bossIntroSlide 3.5s ease-out forwards}
.boss-intro-name{font-size:28px;color:#aa1818;text-shadow:0 0 20px rgba(150,0,0,.6),0 0 40px rgba(100,0,0,.3),3px 3px 0 #000;letter-spacing:5px;font-family:'Press Start 2P',monospace;text-transform:uppercase}
.boss-intro-hp{font-size:11px;color:#cc5533;text-shadow:0 0 6px rgba(200,80,0,.4),2px 2px 0 #000;margin-top:12px;font-family:'Press Start 2P',monospace;letter-spacing:2px}
.boss-intro-mod{font-size:9px;color:#cc7733;text-shadow:0 0 4px rgba(200,100,0,.4),1px 1px 0 #000;margin-top:8px;font-family:'Press Start 2P',monospace;letter-spacing:1px}
.boss-intro-wave{font-size:14px;color:#9a8340;text-shadow:0 0 10px rgba(150,130,60,.4),2px 2px 0 #000;margin-bottom:10px;font-family:'Press Start 2P',monospace;letter-spacing:3px;text-transform:uppercase}
@keyframes torchFlicker{0%{opacity:.7;transform:scaleY(1)}25%{opacity:.9;transform:scaleY(1.1) scaleX(.95)}50%{opacity:.6;transform:scaleY(.9) scaleX(1.05)}75%{opacity:1;transform:scaleY(1.15) scaleX(.9)}100%{opacity:.7;transform:scaleY(1)}}
@keyframes bossBreathe{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.02) scaleX(0.99)}}
#boss-zone.active canvas{animation:bossBreathe 3s ease-in-out infinite}
@keyframes starTwinkle{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes victoryGold{0%{opacity:0}15%{opacity:.5}30%{opacity:.2}50%{opacity:.4}70%{opacity:.15}100%{opacity:0}}
.victory-flash{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(212,175,55,.7),rgba(255,230,100,.3) 40%,transparent 70%);z-index:55;pointer-events:none;animation:victoryGold 1.5s ease-out forwards}
@keyframes tpkDarken{0%{opacity:0}50%{opacity:.6}100%{opacity:.7}}
.tpk-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,0,0,.85);z-index:200;pointer-events:none;animation:tpkDarken 1s ease-out forwards;display:flex;align-items:center;justify-content:center}
.tpk-text{font-size:24px;color:#cc0000;text-shadow:0 0 20px rgba(200,0,0,.8),3px 3px 0 #000;font-family:'Press Start 2P',monospace;text-align:center;letter-spacing:3px}
.tpk-sub{font-size:10px;color:#ff6644;margin-top:12px;text-shadow:1px 1px 0 #000}
#dps-meter{display:none!important}
#dps-meter.active{display:block}
.dps-entry{display:flex;justify-content:space-between;gap:6px;margin:1px 0}
.dps-bar{height:4px;background:linear-gradient(90deg,#cc3333,#ff6644);margin-top:1px;transition:width 0.5s}
#streamer-panel{position:fixed;top:80px;left:8px;z-index:150;background:linear-gradient(180deg,rgba(12,12,28,.96),rgba(8,8,18,.99));border:1px solid #1a1a22;padding:8px;font-size:6px;width:160px;max-height:500px;overflow-y:auto;display:none;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#streamer-panel.open{display:block}
#streamer-panel .sp-title{color:#9a8340;font-size:7px;letter-spacing:2px;margin-bottom:6px;text-align:center;text-transform:uppercase}
#streamer-panel .sp-section{border-top:1px solid #333;padding:4px 0;margin-top:4px}
#streamer-panel .sp-label{color:#888;font-size:5px;margin-bottom:2px}
#streamer-panel input{width:100%;background:#111;border:1px solid #444;color:#d4af37;padding:3px;font-family:'Press Start 2P',monospace;font-size:5px;margin-bottom:3px}
#streamer-panel select{width:100%;background:#111;border:1px solid #444;color:#d4af37;padding:2px;font-family:'Press Start 2P',monospace;font-size:5px;margin-bottom:3px}
.sp-btn{display:inline-block;background:rgba(15,15,30,.9);color:#9a8340;border:1px solid #2a2418;padding:3px 6px;font-family:'Press Start 2P',monospace;font-size:5px;cursor:pointer;margin:1px;letter-spacing:1px}
.sp-btn:hover{background:#2a2418;color:#d4af37;border-color:#5a4a28}
.sp-btn.red{border-color:#8b0000;color:#ff4444}.sp-btn.red:hover{background:#8b0000;color:#fff}
.sp-btn.green{border-color:#2d5016;color:#44ff44}.sp-btn.green:hover{background:#2d5016;color:#fff}
.sp-btn.purple{border-color:#6633aa;color:#cc66ff}.sp-btn.purple:hover{background:#6633aa;color:#fff}
#panel-toggle{position:fixed;top:80px;left:8px;z-index:151;background:rgba(12,12,28,.95);color:#9a8340;border:1px solid #2a2418;padding:4px 8px;font-family:'Press Start 2P',monospace;font-size:6px;cursor:pointer}
#panel-toggle:hover{background:#2a2418;color:#d4af37;border-color:#5a4a28}
</style>
</head>
<body>
<button id="mode-toggle" onclick="toggleMode()">PLEIN ÉCRAN</button>
<div id="game-container">
<canvas id="bg-canvas"></canvas>
<canvas id="fx-canvas"></canvas>
<div id="shop-zone"><canvas id="shop-canvas" width="32" height="18"></canvas><div id="shop-label">FORGE (!shop)</div></div>
</div>
<div id="boss-zone">
<div id="boss-name"></div><div id="boss-mod-tag"></div><div id="boss-phase"></div>
<canvas id="boss-canvas" width="128" height="128"></canvas>
<div id="boss-hp-bar"><div id="boss-hp-fill" style="width:100%"></div><span id="boss-hp-text"></span></div>
<div id="boss-enrage-bar"><div id="boss-enrage-fill"></div></div>
</div>
<div id="hud"><div class="hud-title">TWITCH RPG</div><div id="hud-content"></div></div>
<div id="season-hud"></div>
<div id="combat-log"></div>
<div id="wave-info"></div>
<div id="boss-intro-overlay"><div class="boss-intro-bg"></div><div class="boss-intro-text"><div class="boss-intro-wave"></div><div class="boss-intro-name"></div><div class="boss-intro-hp"></div><div class="boss-intro-mod"></div></div></div>
<div id="wave-banner"></div>
<div id="scoreboard"></div>
<div id="shop-overlay"><button class="shop-close" onclick="closeShopOverlay()">✕</button><div class="shop-header">FORGE & BOUTIQUE</div><div class="shop-gold" id="shop-gold-display"></div><div class="shop-tabs" id="shop-tabs"></div><div class="shop-grid" id="shop-grid"></div></div>
<div id="event-modal">
<div class="ev-title" id="ev-title"></div>
<div class="ev-desc" id="ev-desc"></div>
<div class="ev-timer" id="ev-timer"></div>
<div class="ev-timer-bar"><div class="ev-timer-fill" id="ev-timer-fill" style="width:100%"></div></div>
<div class="ev-votes" id="ev-votes"></div>
<div><button class="ev-btn" onclick="game.voteEvent('do')">!DO</button><button class="ev-btn" onclick="game.voteEvent('notdo')">!NOTDO</button></div>
</div>
<button id="panel-toggle" onclick="document.getElementById('streamer-panel').classList.toggle('open');this.style.display='none'">⚙ PANEL</button>
<div id="streamer-panel">
<div class="sp-title">⚙ STREAMER PANEL</div>
<button class="sp-btn" onclick="this.parentElement.classList.remove('open');document.getElementById('panel-toggle').style.display='block'" style="float:right;font-size:4px">✕</button>
<div class="sp-section">
<div class="sp-label">SIMULER COMMANDE CHAT</div>
<input id="sp-chat-user" placeholder="Pseudo" value="Streamer" style="width:80px">
<input id="sp-chat-cmd" placeholder="!class brigand" style="width:140px" onkeydown="if(event.key==='Enter'){document.getElementById('sp-chat-go').click()}">
<button id="sp-chat-go" class="sp-btn green" onclick="const u=document.getElementById('sp-chat-user').value||'Streamer';const m=document.getElementById('sp-chat-cmd').value.trim();if(!m)return;const parts=m.replace(/^!/,'').split(' ');const cmd=parts[0].toLowerCase();const args=parts.slice(1);game.processCmd(u,cmd,args);document.getElementById('sp-chat-cmd').value=''">▶ ENVOYER</button>
</div>
<div class="sp-section">
<div class="sp-label">CRÉER HÉROS</div>
<input id="sp-name" placeholder="Nom du héros">
<select id="sp-class"><option value="apprenti">Apprenti</option><option value="paysan">Paysan</option><option value="chat">Chat</option><option value="ecuyer">Écuyer</option><option value="brigand">Brigand</option><option value="herboriste">Herboriste</option><option value="barde">Barde</option></select>
<button class="sp-btn green" onclick="const n=document.getElementById('sp-name').value||'Héros_'+Math.floor(Math.random()*999);game.addChar(n,document.getElementById('sp-class').value);document.getElementById('sp-name').value=''">+ CRÉER</button>
</div>
<div class="sp-section">
<div class="sp-label">SPAWN BOSS</div>
<button class="sp-btn red" onclick="game.boss=null;game.spawnBoss()">PROCHAIN BOSS</button>
</div>
<div class="sp-section">
<div class="sp-label">EVENTS</div>
<button class="sp-btn purple" onclick="game.triggerEvent()">🎲 EVENT</button>
<button class="sp-btn" onclick="game.blackMarketOpen=!game.blackMarketOpen;game.log(game.blackMarketOpen?'☠ MARCHÉ NOIR OUVERT!':'Marché Noir fermé','log-event')">☠ MARCHÉ</button>
</div>
<div class="sp-section">
<div class="sp-label">SAISON</div>
<button class="sp-btn" onclick="currentSeason=(currentSeason+1)%4;seasonStartTime=Date.now();drawBG();const sn=SEASONS[currentSeason];game.log(sn.emoji+' '+sn.name,'log-event');showBanner(sn.emoji+' '+sn.name,sn.desc,2000)">SAISON ▶</button>
</div>
<div class="sp-section">
<div class="sp-label">MODE</div>
<button class="sp-btn" onclick="toggleMode()">PLEIN ÉCRAN</button>
<button class="sp-btn" onclick="Object.values(game.characters).forEach(c=>{c.xp+=c.xpNext;const cd=CLASS_DATA[c.className];if(cd.evolutions&&cd.evolutions.length&&c.level>=cd.evoLevel){game.processCmd(c.username,'evoluer',[cd.evolutions[0]])}});game.log('⭐ XP BOOST pour tous!','log-special')">⭐ XP BOOST</button>
<button class="sp-btn red" onclick="Object.values(game.characters).forEach(c=>{if(c.alive){c.hp=0;c.alive=false;c._deathTime=Date.now();c.element.classList.remove('anim-idle');c.element.classList.add('char-dead');c.updateBars()}});game.log('💀 KILL ALL (test revive 30s)','log-dmg')">💀 KILL ALL</button>
<button class="sp-btn" onclick="Object.values(game.characters).forEach(c=>{c.gold+=500;c.popup('+500g','popup popup-gold')});game.log('💰 +500g tous!','log-gold')">💰 +500g</button>
<button class="sp-btn" onclick="const u=Object.keys(game.characters)[0];if(u)openShopOverlay(u,'equip');else game.log('Aucun joueur!','log-dmg')">🛒 SHOP</button>
<button class="sp-btn" onclick="if(game.boss&&game.boss.alive){game.boss.hp=Math.floor(game.boss.maxHp*0.1);game.boss.updateHP();game.boss.updatePhase()}">🗡 Boss 10%</button>
<button class="sp-btn" onclick="game.allies.push({name:'🐉 Dragon Test',hp:3000,atk:200,dur:-1});game.log('🐉 Dragon allié ajouté!','log-event')">🐉 ADD ALLY</button>
<button class="sp-btn purple" onclick="rouletteEvent()">🎰 ROULETTE</button>
<button class="sp-btn" onclick="Object.values(game.characters).forEach(c=>{if(c.alive){const slots=['weapon','armor','boots','amulet','ring'];slots.forEach(sl=>{const items=Object.entries(EQUIPMENT).filter(([,v])=>v.slot===sl).sort((a,b)=>a[1].tier-b[1].tier);const cur=c.equipment[sl];const curT=cur&&EQUIPMENT[cur]?EQUIPMENT[cur].tier:0;const next=items.find(([,v])=>v.tier===curT+1);if(next&&c.gold>=next[1].cost){c.gold-=next[1].cost;c.equip(next[0]);c.popup(next[1].name+'!','popup popup-gold')}})}});game.log('🛒 Auto-shop pour tous!','log-gold')">🛒 AUTO SHOP</button>
<button class="sp-btn" onclick="game.saveGame();game.log('💾 Sauvegarde manuelle!','log-info')">💾 SAVE</button>
<button class="sp-btn" onclick="localStorage.removeItem('twitch_rpg_save');game.log('🗑 Sauvegarde supprimée!','log-dmg')">🗑 CLEAR SAVE</button>
</div>
</div>
<script>
// ================================================================
// CONFIG
// ================================================================
const CONFIG={channel:'sir_elking',testMode:false,botToken:'',maxChars:25,autoAtkInterval:2500,seasonDuration:300000}; // botToken: mets ton token ici localement (ne PAS commit sur GitHub)
let isFullscreen=false,currentSeason=0,seasonStartTime=Date.now();
const SEASONS=[
{name:'HIVER',emoji:'❄️',sky1:'#4a5f7f',sky2:'#2c3e50',ground:'#ddeeff',tree:'#aabbcc',particle:'#ffffff',paysanXP:0.5,defBonus:3,atkBonus:0,healBonus:0,manaRegen:0,desc:'DEF +3 · Paysans -50% XP'},
{name:'PRINTEMPS',emoji:'🌸',sky1:'#87CEEB',sky2:'#98D8C8',ground:'#44aa44',tree:'#33aa33',particle:'#ffaacc',paysanXP:1.5,defBonus:0,atkBonus:0,healBonus:5,manaRegen:1,desc:'Heal +5 · Mana +1/s · Paysans +50% XP'},
{name:'ÉTÉ',emoji:'☀️',sky1:'#FFB347',sky2:'#FFA500',ground:'#ccaa44',tree:'#227722',particle:'#ffdd44',paysanXP:2.0,defBonus:0,atkBonus:3,healBonus:0,manaRegen:0,desc:'ATK +3 · Paysans +100% XP'},
{name:'AUTOMNE',emoji:'🍂',sky1:'#8B4513',sky2:'#D2691E',ground:'#885533',tree:'#cc6622',particle:'#cc8844',paysanXP:1.0,defBonus:1,atkBonus:1,healBonus:2,manaRegen:0,desc:'ATK/DEF +1 · Heal +2'}
];
function toggleMode(){isFullscreen=!isFullscreen;const c=document.getElementById('game-container'),b=document.getElementById('mode-toggle');if(isFullscreen){c.classList.add('fullscreen');b.textContent='OVERLAY'}else{c.classList.remove('fullscreen');b.textContent='PLEIN ÉCRAN';const fx=document.getElementById('fx-canvas');if(fx){const ctx=fx.getContext('2d');ctx.clearRect(0,0,fx.width,fx.height)}}setTimeout(drawBG,800)}

// ================================================================
// COLOR HELPERS
// ================================================================
function shade(col,amt){if(!col||col[0]!=='#')return col||'#888';let hex=col.slice(1);if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];let r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);r=Math.min(255,Math.max(0,r+amt));g=Math.min(255,Math.max(0,g+amt));b=Math.min(255,Math.max(0,b+amt));return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
const COLORS={rouge:'#cc3333',bleu:'#3355bb',vert:'#339933',violet:'#7733aa',noir:'#333344',blanc:'#cccccc',orange:'#cc7722',rose:'#cc4488',cyan:'#33aaaa',jaune:'#ccaa33',or:'#d4af37',sang:'#8b0000',emeraude:'#228b22',saphir:'#0044cc',rubis:'#cc0033',bronze:'#cd7f32',argent:'#aabbcc',ciel:'#66aadd',feu:'#ff4400',glace:'#88ddff',ombre:'#2a2a3e',royal:'#6622aa',foret:'#2d5a1e',corail:'#ff6b6b',nuit:'#191944'};

pretre:{name:'Prêtre',tier:1,hp:100,atk:8,def:7,spd:4,crit:8,role:'ranged',mana:120,

function drawBG(){
    const cont=document.getElementById('game-container'),bgC=document.getElementById('bg-canvas');
    const h=cont.offsetHeight,w=1920;bgC.width=w;bgC.height=h;
    const bg=bgC.getContext('2d');const sn=SEASONS[currentSeason];
    // Clear canvas (transparent sky - game visible behind)
    bg.clearRect(0,0,w,h);
    if(isFullscreen){
        // Stars
        for(let i=0;i<120;i++){bg.fillStyle=`rgba(255,255,255,${.2+Math.random()*.7})`;bg.beginPath();bg.arc(Math.random()*w,Math.random()*h*.4,.5+Math.random()*1.5,0,Math.PI*2);bg.fill()}
        // Moon
        bg.fillStyle='#fffde8';bg.shadowColor='rgba(255,253,232,0.3)';bg.shadowBlur=30;bg.beginPath();bg.arc(1650,90,35,0,Math.PI*2);bg.fill();bg.shadowBlur=0;
        // Mountains
        bg.fillStyle='#0d1a30';bg.globalAlpha=.5;
        bg.beginPath();bg.moveTo(0,h);
        [[0,h*.7],[120,h*.3],[250,h*.5],[400,h*.2],[550,h*.55],[700,h*.25],[900,h*.45],[1100,h*.15],[1300,h*.5],[1500,h*.3],[1700,h*.4],[1920,h*.6]].forEach(p=>bg.lineTo(p[0],p[1]));
        bg.lineTo(1920,h);bg.closePath();bg.fill();
        bg.fillStyle='#fff';bg.globalAlpha=.12;
        [[120,h*.3],[400,h*.2],[700,h*.25],[1100,h*.15],[1500,h*.3]].forEach(p=>{bg.beginPath();bg.moveTo(p[0]-12,p[1]+8);bg.lineTo(p[0],p[1]);bg.lineTo(p[0]+12,p[1]+8);bg.closePath();bg.fill()});
        bg.globalAlpha=1;
        // Trees with season color
        const tc=sn.tree;
        for(let i=0;i<50;i++){
            const tx=Math.random()*w,th=h*(.15+Math.random()*.2),by=h-55;
            bg.fillStyle='#1a0f05';bg.fillRect(tx-2,by-th*.3,4,th*.3);
            bg.globalAlpha=.6;bg.fillStyle=tc;
            for(let j=0;j<3;j++){const ty=by-th*.3-(th*.22*j),lW=th*.3*(1-j*.2);bg.beginPath();bg.moveTo(tx,ty-th*.25);bg.lineTo(tx-lW/2,ty);bg.lineTo(tx+lW/2,ty);bg.closePath();bg.fill()}
            bg.globalAlpha=1;
        }
        // Castle silhouette
        drawCastle(bg,w,h);
    }
    // Ground with season
    const gY=h-55;
    const grd=bg.createLinearGradient(0,gY,0,h);
    grd.addColorStop(0,sn.ground);grd.addColorStop(.2,shade(sn.ground,-20));grd.addColorStop(1,shade(sn.ground,-40));
    bg.fillStyle=grd;bg.fillRect(0,gY,w,55);
    // Grass tufts
    for(let i=0;i<200;i++){
        const x=Math.random()*w,hh=3+Math.random()*8;
        bg.strokeStyle=shade(sn.ground,20);bg.lineWidth=1;
        bg.beginPath();bg.moveTo(x,gY);bg.quadraticCurveTo(x+(Math.random()-.5)*4,gY-hh/2,x,gY-hh);bg.stroke();
    }
    // Rocks scattered on ground
    const rockPositions=[50,220,480,730,950,1180,1420,1680,1820];
    rockPositions.forEach(rx=>{
        const rw=8+Math.random()*12,rh=4+Math.random()*6;
        bg.fillStyle=shade(sn.ground,-30);bg.beginPath();
        bg.moveTo(rx-rw/2,gY);bg.quadraticCurveTo(rx-rw/2,gY-rh,rx,gY-rh-2);
        bg.quadraticCurveTo(rx+rw/2,gY-rh,rx+rw/2,gY);bg.closePath();bg.fill();
        bg.fillStyle=shade(sn.ground,-15);bg.beginPath();
        bg.moveTo(rx-rw/4,gY);bg.quadraticCurveTo(rx,gY-rh+1,rx+rw/4,gY);bg.closePath();bg.fill();
    });
    // Dirt path (subtle)
    bg.fillStyle=shade(sn.ground,-10);bg.globalAlpha=0.3;
    bg.fillRect(0,gY+15,w,8);bg.globalAlpha=1;
    // Torches
    [100,350,600,850,1100,1350,1600,1850].forEach(tx=>{
        const by=gY-2;bg.fillStyle='#3a2a0a';bg.fillRect(tx-2,by-28,4,28);
        bg.fillStyle='#5a4a1a';bg.fillRect(tx-4,by-30,8,3);
        const g=bg.createRadialGradient(tx,by-38,2,tx,by-34,12);

        bg.fillStyle=g;bg.fillRect(tx-12,by-50,24,20);
    });

    if(isFullscreen){

function drawCastle(bg,w,h){
    const cx=w/2,by=h*.55;
    bg.fillStyle='#2d2d3d';
    // Main wall
    bg.fillRect(cx-200,by-100,400,160);
    // Towers
    bg.fillRect(cx-230,by-160,60,220);bg.fillRect(cx+170,by-160,60,220);
    // Center tower tall
    bg.fillRect(cx-50,by-220,100,280);
    // Battlements
    for(let i=0;i<8;i++){bg.fillRect(cx-230+i*15,by-168,8,10)}
    for(let i=0;i<8;i++){bg.fillRect(cx+170+i*15,by-168,8,10)}
    for(let i=0;i<12;i++){bg.fillRect(cx-50+i*15,by-228,8,10)}
    // Roofs
    bg.fillStyle='#5a2020';
    bg.beginPath();bg.moveTo(cx-240,by-160);bg.lineTo(cx-200,by-200);bg.lineTo(cx-160,by-160);bg.fill();
    bg.beginPath();bg.moveTo(cx+160,by-160);bg.lineTo(cx+200,by-200);bg.lineTo(cx+240,by-160);bg.fill();
    bg.beginPath();bg.moveTo(cx-60,by-220);bg.lineTo(cx,by-270);bg.lineTo(cx+60,by-220);bg.fill();
    // Windows glow
    bg.fillStyle='#ffcc44';bg.globalAlpha=.6;
    [[cx-210,by-130],[cx-210,by-100],[cx+190,by-130],[cx+190,by-100],
     [cx-30,by-180],[cx+20,by-180],[cx-30,by-140],[cx+20,by-140]].forEach(p=>{bg.fillRect(p[0],p[1],12,12)});
    bg.globalAlpha=1;
    // Gate
    bg.fillStyle='#1a1a2a';bg.fillRect(cx-25,by+10,50,50);
    bg.fillStyle='#444';for(let i=0;i<5;i++)bg.fillRect(cx-22+i*10,by+10,2,50);
    // Flags
    bg.fillStyle='#cc2222';
    [[cx-200,by-200],[cx+200,by-200],[cx,by-270]].forEach(p=>{
        bg.fillRect(p[0]-1,p[1]-25,2,25);bg.fillRect(p[0]+1,p[1]-25,12,8);
    });
}

function renderShop(){
    const c=_shopUser?game.characters[_shopUser]:null;if(!c)return closeShopOverlay();
    const ov=document.getElementById('shop-overlay');if(!ov)return;
    // Gold
    document.getElementById('shop-gold-display').textContent=`${c.username} — 💰 ${c.gold}g`;

    tabs.innerHTML=tabList.map(t=>`<div class="shop-tab${_shopTab===t.id?' active':''}" onclick="_shopTab='${t.id}';renderShop()">${t.label}</div>`).join('');
    // Grid
    const grid=document.getElementById('shop-grid');
    let html='';
    if(_shopTab==='equip'){
        const slots=['weapon','armor','boots','amulet','ring'];
        slots.forEach(slot=>{
            const label=SLOT_NAMES[slot];
            const items=Object.entries(EQUIPMENT).filter(([,v])=>v.slot===slot).sort((a,b)=>a[1].tier-b[1].tier);
            const curKey=c.equipment[slot];const curTier=curKey&&EQUIPMENT[curKey]?EQUIPMENT[curKey].tier:0;
            items.forEach(([key,eq])=>{
                const owned=eq.tier<=curTier;const nextTier=curTier+1;
                const canBuy=eq.tier===nextTier&&c.gold>=eq.cost;
                const locked=eq.tier>nextTier;
                const cls=owned?'shop-item owned':locked?'shop-item locked':canBuy?'shop-item':'shop-item';
                const tierCol=TIER_COLORS[eq.tier]||'#aaa';
                const statsStr=Object.entries(eq.stats).map(([k,v])=>`+${v}${k.toUpperCase()}`).join(' ');
                const action=owned?'':locked?'':`shopBuy('${_shopUser}','${key}')`;
                html+=`<div class="${cls}" ${action?`onclick="${action}"`:''}>`+
                    `<div class="shop-item-name">${eq.emoji} ${eq.name}<span class="shop-item-tier" style="background:${tierCol};color:#000">T${eq.tier}</span></div>`+
                    `<div class="shop-item-stats">${statsStr}</div>`+
                    `<div class="shop-item-cost">${owned?'✓ Possédé':locked?'🔒 T'+(curTier+1)+' requis':'💰 '+eq.cost+'g'}</div></div>`;
            });
        });
    }else if(_shopTab==='consom'){
        Object.entries(CONSUMABLES).forEach(([key,item])=>{
            const canBuy=c.gold>=item.cost;
            html+=`<div class="shop-item${canBuy?'':' locked'}" ${canBuy?`onclick="shopBuyConsum('${_shopUser}','${key}')"`:''}>`+
                `<div class="shop-item-name">${item.emoji} ${item.name}</div>`+
                `<div class="shop-item-stats">${item.desc}</div>`+
                `<div class="shop-item-cost">💰 ${item.cost}g</div></div>`;
        });
    }else if(_shopTab==='noir'){
        Object.entries(BLACK_MARKET).forEach(([key,item])=>{
            const canBuy=c.gold>=item.cost;
            html+=`<div class="shop-item${canBuy?'':' locked'}" ${canBuy?`onclick="shopBuyConsum('${_shopUser}','${key}')"`:''}>`+
                `<div class="shop-item-name">${item.emoji} ${item.name}</div>`+
                `<div class="shop-item-stats">${item.desc}</div>`+
                `<div class="shop-item-cost">💰 ${item.cost}g</div></div>`;
        });
    }
    grid.innerHTML=html;
}
function shopBuy(username,key){
    const c=game.characters[username];if(!c)return;
    const eq=EQUIPMENT[key];if(!eq)return;
    const curKey=c.equipment[eq.slot];const curTier=curKey&&EQUIPMENT[curKey]?EQUIPMENT[curKey].tier:0;
    if(eq.tier<=curTier||eq.tier>curTier+1||c.gold<eq.cost)return;
    c.gold-=eq.cost;c.equip(key);
    c.popup(eq.name+'!','popup popup-gold');spawnP(c.element,'#d4af37',8);
    if(eq.tier>=4){spawnP(c.element,'#ffffff',10);showBanner(`${eq.emoji} ${eq.name}!`,`${c.username} s'équipe!`,2000)}
    game.log(`${username} équipe ${eq.name} T${eq.tier} (-${eq.cost}g)`,'log-gold');
    const statsStr=Object.entries(eq.stats).map(([k,v])=>`+${v}${k.toUpperCase()}`).join(' ');
    chatSay(`${eq.emoji}🔥 @${username} forge ${eq.name} [T${eq.tier}]! ${statsStr} | La puissance augmente! 💰-${eq.cost}g — !shop pour s'équiper aussi! ⚒`);
    renderShop();
}
function shopBuyConsum(username,key){
    const c=game.characters[username];if(!c)return;
    const allC=game.blackMarketOpen?{...CONSUMABLES,...BLACK_MARKET}:CONSUMABLES;
    const item=allC[key];if(!item||c.gold<item.cost)return;
    c.gold-=item.cost;
    switch(key){
        case 'potion':c.heal(50);break;case 'elixir':c.heal(c.maxHp);break;
        case 'mana_pot':c.mana=Math.min(c.maxMana,c.mana+50);break;
        case 'elixir_vie':c.maxHp+=30;c.hp+=30;break;case 'grimoire':c.maxMana+=30;c.mana+=30;break;
        case 'darkpotion':c.heal(100);break;
        case 'pacte':c.maxHp=Math.max(50,c.maxHp-20);c.hp=Math.min(c.hp,c.maxHp);c.atk+=15;break;
        case 'necro':c.maxMana+=50;c.mana+=50;break;
        case 'ombre':c.spd+=8;c.crit+=5;break;
    }
    c.updateBars();c.popup(item.name+'!','popup popup-gold');spawnP(c.element,'#d4af37',6);
    game.log(`${username} achète ${item.name} (-${item.cost}g)`,'log-gold');
    chatSay(`${item.emoji}✨ @${username} utilise ${item.name}! ${item.desc} | 💰-${item.cost}g — Malin! !shop pour voir la boutique 🛒`);
    renderShop();
}

// Ambient torch flicker + twinkling stars on fx-canvas
let _ambientStars=[];
function initAmbient(){
    // Generate random star positions once
    _ambientStars=[];
    for(let i=0;i<80;i++){
        _ambientStars.push({x:Math.random()*1920,y:Math.random()*400,r:.5+Math.random()*1.5,spd:.3+Math.random()*2,phase:Math.random()*Math.PI*2});
    }
}
initAmbient();
function drawAmbient(){
    if(!isFullscreen)return;
    const cv=document.getElementById('fx-canvas');if(!cv)return;
    const cont=document.getElementById('game-container');if(!cont)return;
    cv.width=1920;cv.height=cont.offsetHeight;
    const fx=cv.getContext('2d');fx.clearRect(0,0,1920,cv.height);
    const now=Date.now()/1000;
    // Twinkling stars
    _ambientStars.forEach(s=>{
        const twinkle=0.2+0.8*((Math.sin(now*s.spd+s.phase)+1)/2);
        fx.globalAlpha=twinkle*0.8;
        fx.fillStyle='#fff';
        fx.beginPath();fx.arc(s.x,s.y,s.r,0,Math.PI*2);fx.fill();
        // Star cross sparkle
        if(s.r>1&&twinkle>0.7){
            fx.globalAlpha=twinkle*0.3;
            fx.strokeStyle='#fff';fx.lineWidth=0.5;
            fx.beginPath();fx.moveTo(s.x-3,s.y);fx.lineTo(s.x+3,s.y);fx.stroke();
            fx.beginPath();fx.moveTo(s.x,s.y-3);fx.lineTo(s.x,s.y+3);fx.stroke();
        }
    });
    fx.globalAlpha=1;
    // Animated torch flames
    const gY=cv.height-55;
    [100,350,600,850,1100,1350,1600,1850].forEach(tx=>{
        const flick=Math.sin(now*4+tx)*3+Math.sin(now*7+tx*2)*2;
        const sz=10+Math.sin(now*5+tx)*3;
        const g=fx.createRadialGradient(tx+flick*.5,gY-38+flick*.3,1,tx,gY-34,sz);
        g.addColorStop(0,'rgba(255,230,120,.8)');g.addColorStop(.3,'rgba(255,160,40,.5)');g.addColorStop(.6,'rgba(255,80,0,.2)');g.addColorStop(1,'rgba(255,50,0,0)');
        fx.fillStyle=g;fx.fillRect(tx-sz,gY-48,sz*2,24);
        // Occasional spark
        if(Math.random()<0.03){
            fx.fillStyle='rgba(255,200,50,.9)';
            fx.beginPath();fx.arc(tx+flick+(Math.random()-0.5)*8,gY-45-Math.random()*15,0.8,0,Math.PI*2);fx.fill();
        }
    });
}

                else{this[k]=(this[k]||0)-v}

        }

            else if(k==='maxMana'){this.maxMana+=v;this.mana+=v}

    render(){
        const bce=document.getElementById('boss-canvas');if(!bce)return;
        const c=bce.getContext('2d');c.clearRect(0,0,128,128);
        PX[this.drawFn](c,2);
        const bn=document.getElementById('boss-name');if(bn)bn.textContent=this.name;
        const mt=document.getElementById('boss-mod-tag');
        if(mt)mt.textContent=this.mod?`${this.mod.emoji} ${this.mod.name}: ${this.mod.desc}`:'';
        const z=document.getElementById('boss-zone');if(!z)return;z.classList.add('active');
        z.classList.remove('boss-intro');void z.offsetWidth;z.classList.add('boss-intro');
        setTimeout(()=>z.classList.remove('boss-intro'),1200);
        bce.style.filter='';
        this.updateHP();
    }
    updateHP(){
        const pct=Math.max(0,(this.hp/this.maxHp)*100);
        const f=document.getElementById('boss-hp-fill');
        if(!f)return;f.style.width=pct+'%';
        if(this.phase===3)f.style.background='linear-gradient(90deg,#ff0000,#660000)';
        else if(this.phase===2)f.style.background='linear-gradient(90deg,#ff8800,#884400)';
        else f.style.background='linear-gradient(90deg,#ff2020,#8b0000)';
        const ht=document.getElementById('boss-hp-text');
        if(ht)ht.textContent=`${Math.max(0,this.hp)} / ${this.maxHp} (${Math.floor(pct)}%)`;
        // HP milestones
        if(this._milestones&&this.alive){
            if(pct<=50&&!this._milestones[50]){this._milestones[50]=true;showBanner('⚠ 50% PV!',`${this.name} vacille!`,1500);bossWarningFlash()}
            if(pct<=25&&!this._milestones[25]){this._milestones[25]=true;showBanner('🔥 25% PV!',`${this.name} est affaibli!`,1500);screenShake(false)}
            if(pct<=10&&!this._milestones[10]){this._milestones[10]=true;showBanner('💀 10% PV!',`ACHEVEZ-LE!`,2000);screenShake(true);critFlash()}
        }
        // Enrage timer bar
        const eb=document.getElementById('boss-enrage-bar'),ef=document.getElementById('boss-enrage-fill');
        if(eb&&ef&&this.alive){
            eb.style.display='block';
            const elapsed=Date.now()-this.spawnTime;const epct=Math.min(100,(elapsed/this.enrageTime)*100);
            ef.style.width=epct+'%';
            const bc=document.getElementById('boss-canvas');
            if(elapsed>=this.enrageTime&&!this.enraged){this.enraged=true;this.atk=Math.floor(this.atk*1.5);if(bc)bc.classList.add('boss-enraged');showBanner('BOSS ENRAGÉ!','Dégâts +50%!',2000)}
            else if(bc&&this.enraged){bc.classList.add('boss-enraged')}
        }else if(eb&&!this.alive){eb.style.display='none'}
    }
    updatePhase(){
        const pct=this.hp/this.maxHp;let np=1;
        if(pct<=0.3)np=3;else if(pct<=0.6)np=2;
        if(np!==this.phase){
            this.phase=np;const pe=document.getElementById('boss-phase');
            const bc=document.getElementById('boss-canvas');
            if(np===2){pe.textContent='⚡ PHASE 2 - ENRAGÉ';this.atk=Math.floor(this.atk*1.3);screenShake(false);showBanner('⚡ PHASE 2','Boss ATK +30%!',2000);if(bc)bc.style.filter='hue-rotate(20deg) saturate(1.3)'}
            else if(np===3){pe.textContent='💀 PHASE FINALE';this.atk=Math.floor(this.atk*1.25);this.enraged=true;screenShake(true);showBanner('💀 PHASE FINALE','Boss déchaîné!',2500);if(bc)bc.style.filter='hue-rotate(40deg) saturate(1.6) brightness(1.2)'}
            this.updateHP();
        }
    }
    takeDmg(dmg){
        if(!this.alive)return 0;let f=Math.max(1,dmg);
        const reduced=this.dmgReduction>0;
        if(reduced)f=Math.max(1,Math.floor(f*(1-this.dmgReduction)));
        this.hp-=f;this.updateHP();this.updatePhase();
        const z=document.getElementById('boss-zone');z.classList.remove('boss-hit');void z.offsetWidth;z.classList.add('boss-hit');
        const isBig=f>100;bossDmgPopup(f,isBig,reduced?`🛡-${Math.round(this.dmgReduction*100)}%`:null);if(isBig)screenShake(false);
        if(this.hp<=0){this.hp=0;this.alive=false;screenShake(true);lootShower();bossDeathExplosion();const bc=document.getElementById('boss-canvas');if(bc)bc.classList.remove('boss-enraged');z.classList.add('boss-dead');setTimeout(()=>{z.classList.remove('boss-dead');z.classList.remove('active')},1200);document.getElementById('boss-phase').textContent='';const mt=document.getElementById('boss-mod-tag');if(mt)mt.textContent='';const eb=document.getElementById('boss-enrage-bar');if(eb)eb.style.display='none'}
        return f;
    }
    attackAll(chars){
        if(!this.alive)return[];const alive=chars.filter(c=>c.alive);if(!alive.length)return[];
        const results=[];
        // Boss-specific special attacks (30% chance)
        if(Math.random()<0.3){
            const sp=this.specialAttack(alive);
            if(sp)return sp;
        }
        // Phase 3 explosive mod bonus
        const explMult=(this.mod&&this.mod.modPhase3Atk&&this.phase===3)?this.mod.modPhase3Atk:1;
        alive.forEach(t=>{
            let dmg=this.atk+Math.floor(Math.random()*12);
            if(this.enraged)dmg+=15;
            if(this.phase===2)dmg=Math.floor(dmg*1.15);
            if(this.phase===3)dmg=Math.floor(dmg*1.3*explMult);
            t.takeDmg(dmg,this.name);results.push({target:t.username,dmg});
            if(this.mod&&this.mod.onAtk)this.mod.onAtk(this,dmg);
            if(this.mod&&this.mod.stealGold)t.gold=Math.max(0,t.gold-(this.mod.stealGold));
            if(this.mod&&this.mod.poisonDmg&&!t._poisoned){
                t._poisoned=true;
                const pid=setInterval(()=>{if(!t.alive||!this.alive){clearInterval(pid);t._poisoned=false;return}t.takeDmg(this.mod.poisonDmg,'🧪 Poison')},3000);
                setTimeout(()=>{clearInterval(pid);t._poisoned=false},15000);
            }
        });
        if(this.mod&&this.mod.onAtk)this.updateHP();
        return results;
    }
    specialAttack(alive){
        const res=[];
        switch(this.type){
            case 'demon':// Flamme infernale - massive AoE
                screenShake(true);showBanner('🔥 FLAMME INFERNALE!','',1500);
                alive.forEach(t=>{const d=Math.floor(this.atk*1.8);t.takeDmg(d,'🔥 Flamme Infernale');spawnP(t.element,'#ff4400',8);res.push({target:t.username,dmg:d,special:'🔥 Flamme Infernale'})});
                return res;
            case 'dragon':// Souffle de feu - front row only (melee)
                showBanner('🐉 SOUFFLE DE FEU!','Melee en danger!',1500);
                alive.filter(c=>c.role==='melee').forEach(t=>{const d=Math.floor(this.atk*2.5);t.takeDmg(d,'🐉 Souffle de Feu');spawnP(t.element,'#ff6600',10);res.push({target:t.username,dmg:d,special:'🐉 Souffle'})});
                alive.filter(c=>c.role==='ranged').forEach(t=>res.push({target:t.username,dmg:0,special:'Esquivé'}));
                return res.length?res:null;
            case 'slime':// Division - heals 15% HP
                const healAmt=Math.floor(this.maxHp*0.15);this.hp=Math.min(this.maxHp,this.hp+healAmt);this.updateHP();
                showBanner('👑 DIVISION!',`Roi Slime se régénère +${healAmt} PV!`,1500);
                return[{target:'BOSS',dmg:0,special:`👑 Division: +${healAmt} PV`}];
            case 'darkknight':// Onde noire - DEF debuff all
                showBanner('⚔ ONDE NOIRE!','DEF -5 pendant 10s!',1500);
                alive.forEach(t=>{t.def=Math.max(0,t.def-5);setTimeout(()=>t.def+=5,10000);const d=Math.floor(this.atk*0.8);t.takeDmg(d,'⚔ Onde Noire');res.push({target:t.username,dmg:d,special:'⚔ Onde Noire'})});
                return res;
            case 'goblin':// Vol massif - steals gold from everyone
                showBanner('👺 VOL MASSIF!','Gobelins pillent!',1500);
                alive.forEach(t=>{const stolen=Math.min(t.gold,30+this.wave*5);t.gold-=stolen;t.popup(`-${stolen}g`,'popup popup-dmg');res.push({target:t.username,dmg:0,special:`👺 Vol: -${stolen}g`})});
                return res;
            case 'lich':// Drain d'âme - drains HP and heals boss
                showBanner('☠ DRAIN D\'ÂME!','',1500);
                alive.forEach(t=>{const d=Math.floor(this.atk*1.2);t.takeDmg(d,'☠ Drain Âme');this.hp=Math.min(this.maxHp,this.hp+Math.floor(d*0.5));spawnP(t.element,'#00ffaa',6);res.push({target:t.username,dmg:d,special:'☠ Drain Âme'})});
                this.updateHP();return res;
            case 'hydra':// Triple morsure - 3 random targets take big damage
                showBanner('🐍 TRIPLE MORSURE!','3 têtes attaquent!',1500);
                for(let i=0;i<3;i++){const t=alive[Math.floor(Math.random()*alive.length)];const d=Math.floor(this.atk*2);t.takeDmg(d,'🐍 Triple Morsure');spawnP(t.element,'#44ff44',5);res.push({target:t.username,dmg:d,special:`🐍 Morsure ${i+1}`})}
                return res;
            case 'golem':// Séisme - small damage but stuns (prevents healing for 8s)
                screenShake(true);showBanner('🗿 SÉISME!','Étourdis 8s!',1500);
                alive.forEach(t=>{const d=Math.floor(this.atk*0.6);t.takeDmg(d,'🗿 Séisme');t._stunned=true;setTimeout(()=>t._stunned=false,8000);res.push({target:t.username,dmg:d,special:'🗿 Séisme'})});
                return res;
        }
        return null;
    }
}

function checkAchievements(c,game){
    if(!c._achievements)c._achievements=new Set();
    ACHIEVEMENTS.forEach(a=>{
        if(!c._achievements.has(a.id)&&a.check(c)){
            c._achievements.add(a.id);
            c.popup(`${a.emoji} ${a.name}!`,'popup popup-lvl');
            spawnP(c.element,'#d4af37',12);
            game.log(`🏆 ${c.username} débloque: ${a.emoji} ${a.name} - ${a.desc}`,'log-gold');
        }
    });
}

        this.goldMulti=1;this.allies=[];this.dragonEgg=0;
        this.eventActive=false;this.currentEvent=null;this.eventVotes={do:new Set(),notdo:new Set()};
        this.eventTimer=null;
        this.xpBonus=1;
    }

    saveGame(){
        try{
            const data={wave:this.wave,totalBossKills:this.totalBossKills,goldMulti:this.goldMulti,
                chars:{}};
            Object.entries(this.characters).forEach(([u,c])=>{
                data.chars[u]={cls:c.className,level:c.level,xp:c.xp,xpNext:c.xpNext,xpMulti:c.xpMulti,
                    hp:c.hp,maxHp:c.maxHp,mana:c.mana,maxMana:c.maxMana,
                    atk:c.atk,def:c.def,spd:c.spd,crit:c.crit,gold:c.gold,
                    kills:c.kills,totalDmg:c.totalDmg,totalHeal:c.totalHeal,
                    classChanges:c.classChanges||0,customColor:c.customColor,
                    equipment:c.equipment||{},
                    achievements:c._achievements?[...c._achievements]:[]};
            });
            localStorage.setItem('twitch_rpg_save',JSON.stringify(data));
        }catch(e){console.warn('Save failed:',e)}
    }

    loadGame(){
        try{
            const raw=localStorage.getItem('twitch_rpg_save');
            if(!raw)return false;
            const data=JSON.parse(raw);
            this.wave=data.wave||0;this.totalBossKills=data.totalBossKills||0;
            this.goldMulti=data.goldMulti||1;
            Object.entries(data.chars||{}).forEach(([u,d])=>{
                if(!CLASS_DATA[d.cls])return;
                this.characters[u]=new Character(u,d.cls);
                const c=this.characters[u];
                c.level=d.level;c.xp=d.xp;c.xpNext=d.xpNext;c.xpMulti=d.xpMulti||1;
                c.hp=d.hp;c.maxHp=d.maxHp;c.mana=d.mana;c.maxMana=d.maxMana;
                c.atk=d.atk;c.def=d.def;c.spd=d.spd;c.crit=d.crit;c.gold=d.gold;
                c.kills=d.kills;c.totalDmg=d.totalDmg||0;c.totalHeal=d.totalHeal||0;
                c.classChanges=d.classChanges||0;c.customColor=d.customColor;
                if(d.equipment){c.equipment=d.equipment;c.updateTierGlow()}
                if(d.achievements)c._achievements=new Set(d.achievements);
                c.redraw();c.updateBars();
            });
            this.log(`💾 Partie chargée! ${Object.keys(this.characters).length} joueurs, vague ${this.wave}`,'log-info');
            return true;
        }catch(e){console.warn('Load failed:',e);return false}
    }

    addChar(username,cls){
        if(this.characters[username]){this.characters[username].remove();delete this.characters[username]}
        if(Object.keys(this.characters).length>=CONFIG.maxChars)return`Max ${CONFIG.maxChars}!`;
        cls=cls||'apprenti';if(!CLASS_DATA[cls])cls='apprenti';

                    this.log(`☠ Les sbires du ${this.boss.name} attaquent ${target.username}!`,'log-dmg');
                }
            },mod.summonInterval);
        }

        setTimeout(()=>this.spawnBoss(),902000);
        // Reset totalDmg/totalHeal for next boss + clear defeat flag after delay
        setTimeout(()=>{Object.values(this.characters).forEach(c=>{c.totalDmg=0;c.totalHeal=0});this._bossDefeating=false},2000);

    // EVENT SYSTEM
    triggerEvent(){
        if(this.eventActive)return;

        this.eventActive=true;this.eventVotes={do:new Set(),notdo:new Set()};

        document.getElementById('ev-timer').textContent=timer+'s';

        this.eventTimer=setInterval(()=>{
            timer--;document.getElementById('ev-timer').textContent=timer+'s';

            if(timer<=5)document.getElementById('ev-timer').style.color='#ff0000';
            if(timer<=0){clearInterval(this.eventTimer);document.getElementById('ev-timer').style.color='#ff4444';this.resolveEvent()}
        },1000);

    voteEvent(choice,username){
        if(!this.eventActive)return;
        if(username){this.eventVotes.do.delete(username);this.eventVotes.notdo.delete(username);this.eventVotes[choice].add(username)}
        else{this.eventVotes[choice]=new Set([...(this.eventVotes[choice]||[]),'streamer'])}
        document.getElementById('ev-votes').textContent=`!DO: ${this.eventVotes.do.size} | !NOTDO: ${this.eventVotes.notdo.size}`;
    }
    resolveEvent(){
        this.eventActive=false;document.getElementById('event-modal').classList.remove('show');
        if(!this.currentEvent)return;
        const doWins=this.eventVotes.do.size>=this.eventVotes.notdo.size;
        if(doWins){this.currentEvent.doFn(this);this.log(`✅ DO gagne! ${this.currentEvent.doText}`,'log-event')}
        else{this.currentEvent.notdoFn(this);this.log(`❌ NOTDO gagne! ${this.currentEvent.notdoText}`,'log-event')}
        this.currentEvent=null;
    }

    // SHOP VOTE SYSTEM (3 viewers must agree)
    shopVote(username){
        const now=Date.now();
        // Reset if expired (60s)
        if(!this._shopVote||now-this._shopVote.time>60000){
            this._shopVote={voters:[username],time:now,needed:3};
            chatSay(`🛒🔥 @${username} veut ouvrir la BOUTIQUE! ${this._shopVote.needed-1} autres votes nécessaires! Tapez !shop pour voter! ⚒`);
            return null;
        }
        // Already voted
        if(this._shopVote.voters.includes(username)){
            return`Tu as déjà voté! (${this._shopVote.voters.length}/${this._shopVote.needed}) — En attente...`;
        }
        // Add vote
        this._shopVote.voters.push(username);
        const remaining=this._shopVote.needed-this._shopVote.voters.length;
        if(remaining>0){
            chatSay(`🛒 @${username} vote pour la boutique! Encore ${remaining} vote${remaining>1?'s':''}! Tapez !shop! ⚒`);
            return null;
        }
        // VOTE PASSED! Show shop in chat
        this._shopVote=null;
        chatSay(`🛒🔥 BOUTIQUE OUVERTE! Les héros ont voté!`);
        // List equipment by slot
        const slots=['weapon','armor','boots','amulet','ring'];
        slots.forEach(slot=>{
            const items=Object.entries(EQUIPMENT).filter(([,v])=>v.slot===slot)
                .map(([k,v])=>`${v.emoji}${v.name} T${v.tier}(${v.cost}g)`).join(' | ');
            chatSay(`⚒ ${SLOT_NAMES[slot]}: ${items}`);
        });
        // List consumables
        const consList=Object.entries(CONSUMABLES).map(([k,v])=>`${v.emoji}${v.name}(${v.cost}g)`).join(' | ');
        chatSay(`🧪 Consommables: ${consList}`);
        if(this.blackMarketOpen){
            const bmList=Object.entries(BLACK_MARKET).map(([k,v])=>`${v.emoji}${v.name}(${v.cost}g)`).join(' | ');
            chatSay(`🏪 Marché Noir: ${bmList}`);
        }

        return null;
    }

    onLootDrop(){
        const tiers=this.boss._lootTiers||[1,2];
        const tier=tiers[Math.floor(Math.random()*tiers.length)];
        const lootPool=Object.entries(EQUIPMENT).filter(([,v])=>v.tier===tier);
        const alive=Object.values(this.characters).filter(c=>c.alive);
        alive.forEach(c=>{
            const pick=lootPool[Math.floor(Math.random()*lootPool.length)];
            if(!pick)return;
            const[key,item]=pick;
            const curKey=c.equipment[item.slot];
            const curTier=curKey&&EQUIPMENT[curKey]?EQUIPMENT[curKey].tier:0;
            if(item.tier>curTier){
                if(curKey&&EQUIPMENT[curKey]){Object.entries(EQUIPMENT[curKey].stats).forEach(([st,v])=>{if(st==='maxHp'){c.maxHp-=v}else if(st==='maxMana'){c.maxMana-=v}else{c[st]-=v}})}
                c.equipment[item.slot]=key;
                Object.entries(item.stats).forEach(([st,v])=>{if(st==='maxHp'){c.maxHp+=v;c.hp+=v}else if(st==='maxMana'){c.maxMana+=v;c.mana+=v}else{c[st]=(c[st]||0)+v}});
                c.updateBars();c.popup(`${item.emoji}${item.name}!`,'popup popup-crit');
                spawnP(c.element,'#d4af37',10);
                chatSay(`🎁🔥 LOOT! @${c.username} récupère ${item.emoji} ${item.name} T${item.tier}! Quelle chance! 💎`);

    // TEAM DUEL (streamer-only: !teamduel N or !teamduel @p1 @p2 vs @p3 @p4)
    teamDuel(args){
        const alive=Object.values(this.characters).filter(c=>c.alive);
        if(alive.length<2){this.log('❌ Pas assez de joueurs vivants!','log-dmg');return}
        // Parse: !teamduel 2 = 2v2 random, !teamduel 3 = 3v3, etc.
        // Or: !teamduel p1 p2 vs p3 p4 = custom teams
        const vsIdx=args.indexOf('vs');
        let team1=[],team2=[];
        if(vsIdx>0){
            // Custom teams: !teamduel p1 p2 vs p3 p4
            const t1names=args.slice(0,vsIdx).map(n=>n.replace('@','').toLowerCase());
            const t2names=args.slice(vsIdx+1).map(n=>n.replace('@','').toLowerCase());
            team1=t1names.map(n=>alive.find(c=>c.username.toLowerCase()===n)).filter(Boolean);
            team2=t2names.map(n=>alive.find(c=>c.username.toLowerCase()===n)).filter(Boolean);
            if(team1.length===0||team2.length===0){chatSay('❌ Joueurs introuvables!');return}
        }else{
            // Random teams: !teamduel N
            const size=Math.min(parseInt(args[0])||1,Math.floor(alive.length/2));
            if(size<1){chatSay('❌ Usage: !teamduel <taille> ou !teamduel p1 p2 vs p3 p4');return}
            const pool=[...alive].sort(()=>Math.random()-0.5);
            team1=pool.slice(0,size);team2=pool.slice(size,size*2);
            if(team2.length<1){chatSay('❌ Pas assez de joueurs pour un duel '+size+'v'+size+'!');return}
        }
        const t1names=team1.map(c=>c.username).join(', ');
        const t2names=team2.map(c=>c.username).join(', ');
        const label=`${team1.length}v${team2.length}`;
        showBanner(`⚔ DUEL ${label}!`,`${t1names} VS ${t2names}`,3000);
        screenShake(true);critFlash();
        chatSay(`⚔🔥 DUEL D'ÉQUIPE ${label}! [${t1names}] VS [${t2names}] — Qui va dominer?! Prenez vos paris! 💥`);
        // Simulate 3 rounds
        let t1hp=team1.reduce((s,c)=>s+c.hp,0);
        let t2hp=team2.reduce((s,c)=>s+c.hp,0);
        let t1atk=team1.reduce((s,c)=>s+c.atk,0);
        let t2atk=team2.reduce((s,c)=>s+c.atk,0);
        let t1def=team1.reduce((s,c)=>s+c.def,0);
        let t2def=team2.reduce((s,c)=>s+c.def,0);
        for(let i=0;i<3;i++){
            const dmg1=Math.max(1,t1atk+Math.floor(Math.random()*15*team1.length)-t2def);
            const dmg2=Math.max(1,t2atk+Math.floor(Math.random()*15*team2.length)-t1def);
            t2hp-=dmg1;t1hp-=dmg2;
            this.log(`⚔ R${i+1}: Équipe 1 inflige ${dmg1} | Équipe 2 inflige ${dmg2}`,'log-special');
        }
        const winners=t1hp>=t2hp?team1:team2;
        const losers=t1hp>=t2hp?team2:team1;
        const goldPerWinner=30+this.wave*5;
        const xpPerWinner=15+this.wave*2;
        winners.forEach(c=>{c.gold+=goldPerWinner;c.xp+=xpPerWinner;c.popup('VICTOIRE!','popup popup-crit');spawnP(c.element,'#d4af37',15);c.checkLevelUp()});
        losers.forEach(c=>{c.popup('DÉFAITE','popup popup-dmg');spawnP(c.element,'#ff4444',8)});
        const wNames=winners.map(c=>'@'+c.username).join(' ');
        this.log(`🏆 Équipe [${winners.map(c=>c.username).join(', ')}] gagne le duel ${label}! +${goldPerWinner}g +${xpPerWinner}XP!`,'log-special');
        chatSay(`🏆🔥 DOMINATION ${label}! ${wNames} écrasent l'adversaire! +${goldPerWinner}g +${xpPerWinner}XP chacun! GG! 💪`);
    }

    // FORCED DUEL (streamer-only: !forceduel player1 player2)
    forceDuel(p1name,p2name){
        const c1=Object.values(this.characters).find(c=>c.username.toLowerCase()===p1name);
        const c2=Object.values(this.characters).find(c=>c.username.toLowerCase()===p2name);
        if(!c1||!c2){this.log('❌ Joueur introuvable!','log-dmg');return}
        if(!c1.alive||!c2.alive){this.log('❌ Un joueur est KO!','log-dmg');return}
        showBanner('⚔ DUEL FORCÉ!',`${c1.username} VS ${c2.username}`,3000);
        screenShake(true);critFlash();
        // 3 rounds of combat
        let hp1=c1.hp,hp2=c2.hp;
        for(let i=0;i<3;i++){
            const dmg1=Math.max(1,c1.atk+Math.floor(Math.random()*10)-c2.def);
            const dmg2=Math.max(1,c2.atk+Math.floor(Math.random()*10)-c1.def);
            hp2-=dmg1;hp1-=dmg2;
            this.log(`⚔ R${i+1}: ${c1.username} -${dmg1} → ${c2.username} | ${c2.username} -${dmg2} → ${c1.username}`,'log-special');
        }
        const winner=hp1>=hp2?c1:c2;const loser=hp1>=hp2?c2:c1;
        const prize=Math.min(loser.gold,50+this.wave*5);loser.gold-=prize;winner.gold+=prize;
        winner.xp+=20;
        spawnP(winner.element,'#d4af37',20);spawnP(loser.element,'#ff4444',10);
        winner.popup('VICTOIRE!','popup popup-crit');loser.popup('DÉFAITE','popup popup-dmg');
        this.log(`🏆 ${winner.username} gagne le duel! +${prize}g +20XP!`,'log-special');
        chatSay(`🏆⚔ VICTOIRE ÉCRASANTE! @${winner.username} terrasse @${loser.username}! +${prize}g +20XP! Qui ose le défier? !duel 💪🔥`);
    }

    log(text,cls){this.combatLog.unshift({text,cls,time:Date.now()});if(this.combatLog.length>25)this.combatLog.pop();this.renderLog()}
    renderLog(){document.getElementById('combat-log').innerHTML=this.combatLog.slice(0,12).map(l=>`<div class="${l.cls}">${l.text}</div>`).join('')}
}

// ── ROULETTE SYSTEM: random item every 20 minutes ──
const ROULETTE_POOL=[
    ...Object.keys(EQUIPMENT).filter(k=>EQUIPMENT[k].tier<=3),
    ...Object.keys(CONSUMABLES)
];
function rouletteEvent(){
    const chars=Object.values(game.characters).filter(c=>c.alive);
    if(!chars.length)return;
    const winner=chars[Math.floor(Math.random()*chars.length)];
    const itemKey=ROULETTE_POOL[Math.floor(Math.random()*ROULETTE_POOL.length)];
    // Visual roulette spin overlay
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;text-align:center;pointer-events:none';
    const spinItems=[];for(let i=0;i<20;i++)spinItems.push(ROULETTE_POOL[Math.floor(Math.random()*ROULETTE_POOL.length)]);
    spinItems.push(itemKey);
    let idx=0;
    const label=document.createElement('div');
    label.style.cssText='font-size:20px;color:#d4af37;font-family:"Press Start 2P",monospace;text-shadow:0 0 20px rgba(212,175,55,.8),3px 3px 0 #000;letter-spacing:2px';
    const sub=document.createElement('div');
    sub.style.cssText='font-size:10px;color:#aaa;font-family:"Press Start 2P",monospace;text-shadow:1px 1px 0 #000;margin-top:8px';
    sub.textContent='ROULETTE...';
    ov.append(label,sub);document.body.appendChild(ov);
    showBanner('ROULETTE!','Un objet gratuit!',2000);
    function spinStep(){
        if(idx>=spinItems.length){
            // Award item
            const isEquip=!!EQUIPMENT[itemKey];
            if(isEquip){
                const eq=EQUIPMENT[itemKey];
                const curKey=winner.equipment[eq.slot];
                const curTier=curKey&&EQUIPMENT[curKey]?EQUIPMENT[curKey].tier:0;
                if(eq.tier>curTier){winner.equip(itemKey);sub.textContent=`${winner.username} equipe ${eq.name}!`}
                else{const gBonus=Math.floor(eq.cost*0.5);winner.gold+=gBonus;sub.textContent=`${winner.username} +${gBonus}g (déjà équipé)`}
            }else{
                const cs=CONSUMABLES[itemKey];
                if(itemKey==='potion')winner.heal(50);
                else if(itemKey==='elixir')winner.heal(winner.maxHp);
                else if(itemKey==='mana_pot'){winner.mana=Math.min(winner.maxMana,winner.mana+50);winner.updateBars()}
                else if(itemKey==='elixir_vie'){winner.maxHp+=30;winner.hp+=30}
                else if(itemKey==='grimoire'){winner.maxMana+=30;winner.mana+=30}
                sub.textContent=`${winner.username} reçoit ${cs?cs.name:itemKey}!`;
            }
            label.style.color='#44ff44';label.style.fontSize='24px';
            spawnP(winner.element,'#d4af37',15);spawnP(winner.element,'#ffffff',10);
            winner.popup('ROULETTE!','popup popup-crit');
            critFlash();screenShake(false);
            const itemName=isEquip?EQUIPMENT[itemKey].name:(CONSUMABLES[itemKey]?.name||itemKey);
            game.log(`ROULETTE: ${winner.username} gagne ${itemName}!`,'log-event');
            chatSay(`🎰🔥 JACKPOT! @${winner.username} remporte ${itemName}! La chance sourit aux braves! GG! 🍀💎`);
            setTimeout(()=>ov.remove(),3000);
            return;
        }
        const cur=spinItems[idx];
        const e=EQUIPMENT[cur]||CONSUMABLES[cur];
        label.textContent=e?(e.emoji||'')+' '+e.name:cur;
        idx++;
        setTimeout(spinStep,idx<15?120:idx<18?300:600);
    }
    spinStep();
}

// ================================================================
// TWITCH CONNECTION
// ================================================================
let _twitchClient=null;
// Anti-duplicate: only one instance sends chat messages (first to claim wins)
const _instanceId=Date.now()+'_'+Math.random().toString(36).slice(2);
const _chatLock='rpg_chat_lock';
const _lastMsgs=[];
function _claimChatLock(){
    const lock=localStorage.getItem(_chatLock);
    const now=Date.now();
    // Lock expires after 10s or if this instance owns it
    if(!lock||lock===_instanceId||(now-parseInt(lock.split('|')[1]||0))>10000){
        localStorage.setItem(_chatLock,_instanceId+'|'+now);
        return true;
    }
    return lock.startsWith(_instanceId);
}
// Refresh lock every 5s
setInterval(()=>{const l=localStorage.getItem(_chatLock);if(l&&l.startsWith(_instanceId))localStorage.setItem(_chatLock,_instanceId+'|'+Date.now())},5000);
function chatSay(msg){
    if(!_twitchClient||!CONFIG.botToken)return;
    if(!_claimChatLock())return; // Only one instance talks
    // Dedup: skip if same message sent in last 3s
    const now=Date.now();
    const key=msg.slice(0,80);
    if(_lastMsgs.find(m=>m.k===key&&now-m.t<3000))return;
    _lastMsgs.push({k:key,t:now});
    if(_lastMsgs.length>20)_lastMsgs.shift();
    _twitchClient.say(CONFIG.channel,msg).catch(()=>{});
}
function initTwitch(){
    if(typeof tmi==='undefined')return;
    if(CONFIG.channel==='VOTRE_CHANNEL_ICI')return;
    const opts={channels:[CONFIG.channel]};
    if(CONFIG.botToken){opts.identity={username:CONFIG.channel,password:'oauth:'+CONFIG.botToken.replace('oauth:','')}}
    _twitchClient=new tmi.Client(opts);
    _twitchClient.connect().then(()=>{console.log('Twitch: '+CONFIG.channel+(CONFIG.botToken?' (auth)':' (anon)'));game.log('📡 Twitch connecté: '+CONFIG.channel+(CONFIG.botToken?' ✓ Chat actif':''),'log-info');startPeriodicGuide()}).catch(e=>{console.error(e);game.log('❌ Twitch: erreur connexion','log-dmg')});
    _twitchClient.on('message',(ch,tags,msg,self)=>{
        if(self)return;const u=tags['display-name']||tags.username;
        const m=msg.trim().toLowerCase();if(!m.startsWith('!'))return;
        const parts=m.split(' '),cmd=parts[0].substring(1),args=parts.slice(1);
        const valid=['class','attaque','soin','sort','defense','esquive','special','stats','couleur','design','look','style','shop','marche','evolution','evoluer','reclass','do','notdo','skill','help','commandes','succes','achievements','classement','top','leaderboard','don','give','duel','info','buffs','recap','equip','equipement'];
        if(valid.includes(cmd)){console.log(`CMD: ${u} !${cmd} ${args.join(' ')}`);const r=game.processCmd(u,cmd,args);if(r&&CONFIG.botToken)chatSay(`@${u} ${r}`)}
        // Streamer-only commands (broadcaster or mod)
        const isBroadcaster=tags.badges&&(tags.badges.broadcaster||tags.badges.moderator);
        if(isBroadcaster){
            if(cmd==='event'){game.triggerEvent();chatSay(`🎲🔥 EVENT SPÉCIAL lancé par @${u}! Que va-t-il se passer?! 😱`)}
            else if(cmd==='loot'){game.spawnLootMonster();chatSay(`💎🔥 Monstre BUTIN invoqué par @${u}! Du loot ÉPIQUE en jeu! Foncez! ⚔`)}
            else if(cmd==='forceduel'){
                const p1=(args[0]||'').toLowerCase(),p2=(args[1]||'').toLowerCase();
                if(p1&&p2){game.forceDuel(p1,p2);chatSay(`⚔💥 DUEL FORCÉ! ${p1} vs ${p2}! Qui va survivre?! Prenez vos paris! 🔥`)}
                else chatSay(`@${u} Usage: !forceduel <joueur1> <joueur2>`)
            }
            else if(cmd==='bossnow'){game.spawnBoss();chatSay(`👹🔥 BOSS invoqué par @${u}! Préparez-vous au COMBAT! !attaque !sort !skill ⚔`)}
            else if(cmd==='goldmonster'){game.spawnGoldMonster();chatSay(`💰🔥 MONSTRE D'OR invoqué par @${u}! Frappez-le pour devenir RICHES! 🤑⚔`)}
            else if(cmd==='teamduel'){
                if(args.length<1)chatSay(`@${u} Usage: !teamduel <taille> ou !teamduel p1 p2 vs p3 p4`);
                else game.teamDuel(args);
            }
        }
    });
    // Remove character when viewer leaves the channel
    _twitchClient.on('part',(ch,username)=>{
        const u=username.charAt(0).toUpperCase()+username.slice(1);
        const key=Object.keys(game.characters).find(k=>k.toLowerCase()===username.toLowerCase());
        if(key&&game.characters[key]){
            game.characters[key].remove();
            delete game.characters[key];
            game.log(`👋 ${key} a quitté le stream`,'log-info');
        }
    });
}

// PERIODIC CHAT GUIDE (every 20 min)
// ================================================================
function startPeriodicGuide(){
    if(!CONFIG.botToken)return;
    const msgs=[
        `⚔🔥 TWITCH RPG ⚔ Rejoins le combat! !class apprenti/paysan/chat/ecuyer/brigand/herboriste/barde — Évolue au Nv.3 et deviens LÉGENDAIRE! 🎮💪`,
        `📜 TU VEUX DOMINER? !attaque !sort !skill !special pour combattre | !shop pour t'équiper | !evoluer pour monter en puissance | !duel pour défier! 🔥`,
        `💡 ASTUCE PRO: Combo x3+ = GROS bonus DMG 💥 | !shop = équipement surpuissant ⚒ | !evoluer = nouvelle classe! Qui sera le N°1? 🏆`
    ];
    let idx=0;
    setInterval(()=>{
        if(_twitchClient&&CONFIG.botToken){
            chatSay(msgs[idx]);
            idx=(idx+1)%msgs.length;
        }
    },1200000);
    // First guide after 2 min
    setTimeout(()=>{if(_twitchClient&&CONFIG.botToken)chatSay(msgs[0])},120000);
    // STREAMER PANEL — private command reminder every 5 min (visible only in overlay log)
    setInterval(()=>{
        const pc=Object.keys(game.characters).length;
        const lines=[
            `━━ 🎮 PANEL STREAMER ━━`,
            `👥 ${pc} joueur${pc>1?'s':''} actifs | Vague ${game.wave}`,
            `📋 COMMANDES STREAMER:`,
            `!event — Lancer un événement aléatoire`,
            `!bossnow — Invoquer un boss immédiatement`,
            `!loot — Invoquer un monstre butin`,
            `!goldmonster — Invoquer un monstre d'or`,
            `!forceduel j1 j2 — Forcer un duel`,
            `!teamduel N — Duel d'équipe NvN`,
            `━━━━━━━━━━━━━━━━━━━━━━━`
        ];
        lines.forEach(l=>game.log(l,'log-special'));
    },300000);
    // First panel after 30s
    setTimeout(()=>{
        game.log('━━ 🎮 PANEL STREAMER ━━','log-special');
        game.log('!event !bossnow !loot !goldmonster !forceduel !teamduel','log-special');
    },30000);
}
